services:
  web:
    build: .
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html/bialy
    environment:
      DB_HOST: db
      DB_USER: fabrica
      DB_PASS: fabrica
      DB_NAME: fabrica
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: fabrica
      MYSQL_USER: fabrica
      MYSQL_PASSWORD: fabrica
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ufabrica", "-pfabrica"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin:latest
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: fabrica
      PMA_PASSWORD: fabrica
    depends_on:
      - db
    restart: unless-stopped

volumes:
  db_data:
